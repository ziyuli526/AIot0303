<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ziyu Li – Personal Page with Live Clock">
    <title>Ziyu Li | Personal Page</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* ========== RESET & BASE ========== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --accent-purple: #a855f7;
            --accent-violet: #7c3aed;
            --accent-pink: #ec4899;
            --accent-blue: #6366f1;
            --text-primary: #f1f1f6;
            --text-secondary: #a0a0b8;
            --text-muted: #5a5a72;
            --gradient-1: linear-gradient(135deg, #a855f7, #ec4899, #6366f1);
            --gradient-2: linear-gradient(135deg, #7c3aed, #a855f7);
            --glow-purple: 0 0 40px rgba(168, 85, 247, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: var(--accent-purple);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: var(--accent-pink);
            bottom: -10%;
            right: -10%;
            animation-delay: -7s;
        }

        .bg-orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: var(--accent-blue);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(60px, -40px) scale(1.1);
            }

            50% {
                transform: translate(-30px, 60px) scale(0.9);
            }

            75% {
                transform: translate(40px, 30px) scale(1.05);
            }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
        }

        /* ========== NAVIGATION ========== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.6);
            border-bottom: 1px solid rgba(168, 85, 247, 0.1);
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.3rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* ========== HERO SECTION ========== */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.85rem;
            color: var(--accent-purple);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .hero-name {
            font-size: clamp(3.5rem, 10vw, 9rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -3px;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .hero-name .first-name {
            display: block;
            color: var(--text-primary);
            text-shadow: 0 0 80px rgba(255, 255, 255, 0.1);
        }

        .hero-name .last-name {
            display: block;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.4));
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        /* ========== CLOCK SECTION ========== */
        .clock-section {
            position: relative;
            z-index: 1;
            padding: 60px 20px 100px;
        }

        .clock-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glow-purple), 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .clock-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-1);
        }

        .clock-container::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .clock-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clock-label .line {
            width: 30px;
            height: 1px;
            background: var(--text-muted);
        }

        .clock-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 40px;
        }

        .clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .time-group {
            display: flex;
            gap: 6px;
        }

        .time-digit {
            font-family: 'Space Mono', monospace;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 700;
            color: var(--text-primary);
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.12);
            border-radius: 12px;
            width: clamp(50px, 10vw, 80px);
            height: clamp(65px, 12vw, 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .time-digit.flip {
            animation: digitFlip 0.5s ease-out;
        }

        @keyframes digitFlip {
            0% {
                transform: scaleY(0.6);
                opacity: 0.5;
            }

            50% {
                transform: scaleY(1.05);
            }

            100% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        .time-separator {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: var(--accent-purple);
            animation: blink 1s ease-in-out infinite;
            margin: 0 4px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .clock-date {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 10px;
        }

        .clock-timezone {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 1px;
        }

        /* ========== INFO BAND ========== */
        .info-band {
            position: relative;
            z-index: 1;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(168, 85, 247, 0.1);
            border-bottom: 1px solid rgba(168, 85, 247, 0.1);
            padding: 50px 20px;
            margin-bottom: 80px;
        }

        .info-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .info-item {
            animation: fadeInUp 0.8s ease-out both;
        }

        .info-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .info-item:nth-child(3) {
            animation-delay: 0.2s;
        }

        .info-item:nth-child(4) {
            animation-delay: 0.3s;
        }

        .info-value {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* ========== SECONDS PROGRESS BAR ========== */
        .seconds-bar-container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 40px;
        }

        .seconds-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .seconds-bar {
            width: 100%;
            height: 3px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .seconds-bar-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            transition: width 0.15s linear;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        /* ========== FOOTER ========== */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(168, 85, 247, 0.08);
        }

        footer p {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        footer .heart {
            color: var(--accent-pink);
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.2);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.15);
            }
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== SCROLL ANIMATIONS ========== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }

            .nav-links {
                gap: 20px;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            .clock-container {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                display: none;
            }

            .hero-name {
                letter-spacing: -1px;
            }

            .time-digit {
                border-radius: 8px;
            }

            .clock-display {
                gap: 4px;
            }

            .time-group {
                gap: 3px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>
    <div class="noise-overlay"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-logo">ZL.</div>
        <ul class="nav-links">
            <li><a href="#hero">Home</a></li>
            <li><a href="#clock">Clock</a></li>
            <li><a href="#info">Info</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-badge">
            <span class="dot"></span>
            Personal Page
        </div>
        <h1 class="hero-name">
            <span class="first-name">ZIYU</span>
            <span class="last-name">LI</span>
        </h1>
        <p class="hero-subtitle">Creative · Developer · Dreamer</p>
    </section>

    <!-- Clock Section -->
    <section class="clock-section" id="clock">
        <div class="clock-container reveal">
            <div class="clock-label">
                <span class="line"></span>
                Current Local Time
            </div>
            <div class="clock-title">🕐 Live Clock — Taipei Standard Time</div>

            <div class="clock-display" id="clockDisplay">
                <div class="time-group">
                    <div class="time-digit" id="h1">0</div>
                    <div class="time-digit" id="h2">0</div>
                </div>
                <span class="time-separator">:</span>
                <div class="time-group">
                    <div class="time-digit" id="m1">0</div>
                    <div class="time-digit" id="m2">0</div>
                </div>
                <span class="time-separator">:</span>
                <div class="time-group">
                    <div class="time-digit" id="s1">0</div>
                    <div class="time-digit" id="s2">0</div>
                </div>
            </div>

            <div class="clock-date" id="clockDate"></div>
            <div class="clock-timezone" id="clockTimezone">UTC+08:00 · Asia/Taipei</div>

            <div class="seconds-bar-container">
                <div class="seconds-bar-label">
                    <span>Minute Progress</span>
                    <span id="secondsPercent">0%</span>
                </div>
                <div class="seconds-bar">
                    <div class="seconds-bar-fill" id="secondsFill"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Info Band -->
    <section class="info-band" id="info">
        <div class="info-grid">
            <div class="info-item reveal">
                <div class="info-value" id="dayOfYear">—</div>
                <div class="info-label">Day of Year</div>
            </div>
            <div class="info-item reveal">
                <div class="info-value" id="weekNumber">—</div>
                <div class="info-label">Week Number</div>
            </div>
            <div class="info-item reveal">
                <div class="info-value" id="dayName">—</div>
                <div class="info-label">Day of Week</div>
            </div>
            <div class="info-item reveal">
                <div class="info-value" id="yearProgress">—</div>
                <div class="info-label">Year Progress</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Made with <span class="heart">♥</span> by Ziyu Li · <span id="footerYear"></span></p>
    </footer>

    <script>
        // ========== CLOCK LOGIC ==========
        let prevDigits = { h1: '', h2: '', m1: '', m2: '', s1: '', s2: '' };

        function updateClock() {
            const now = new Date();

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const millis = now.getMilliseconds();

            const digits = {
                h1: hours[0], h2: hours[1],
                m1: minutes[0], m2: minutes[1],
                s1: seconds[0], s2: seconds[1]
            };

            // Update digits with flip animation
            for (const [id, val] of Object.entries(digits)) {
                const el = document.getElementById(id);
                if (prevDigits[id] !== val) {
                    el.textContent = val;
                    el.classList.remove('flip');
                    void el.offsetWidth; // trigger reflow
                    el.classList.add('flip');
                }
            }
            prevDigits = { ...digits };

            // Update date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', options);

            // Seconds progress bar
            const secProgress = ((parseInt(seconds) * 1000 + millis) / 60000) * 100;
            document.getElementById('secondsFill').style.width = secProgress + '%';
            document.getElementById('secondsPercent').textContent = Math.floor(secProgress) + '%';

            // Info band
            const startOfYear = new Date(now.getFullYear(), 0, 0);
            const diff = now - startOfYear;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            document.getElementById('dayOfYear').textContent = dayOfYear;

            // Week number
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            document.getElementById('weekNumber').textContent = 'W' + weekNo;

            // Day name
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.getElementById('dayName').textContent = days[now.getDay()];

            // Year progress
            const totalDays = ((now.getFullYear() % 4 === 0 && now.getFullYear() % 100 !== 0) || now.getFullYear() % 400 === 0) ? 366 : 365;
            const yearProg = ((dayOfYear / totalDays) * 100).toFixed(1);
            document.getElementById('yearProgress').textContent = yearProg + '%';
        }

        // Footer year
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        // Initial call + interval
        updateClock();
        setInterval(updateClock, 100);

        // ========== SCROLL REVEAL ==========
        const revealElements = document.querySelectorAll('.reveal');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        revealElements.forEach(el => observer.observe(el));
    </script>

</body>

</html>
